<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Tracer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:sans-serif;
}

#camera{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
}

#overlay{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    max-width:90%;
    max-height:90%;
    z-index:2;
    opacity:0.5;
    pointer-events:none;
}

.controls{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    background:rgba(0,0,0,.7);
    padding:15px;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    width:90%;
    max-width:350px;
}

input[type="range"]{
    width:100%;
}

button,label{
    background:#fff;
    border:none;
    padding:10px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

input[type="file"]{
    display:none;
}
</style>
</head>
<body>

<video id="camera" autoplay playsinline></video>

<img id="overlay">

<div class="controls">

    <label for="imageInput">
        Pilih Gambar
    </label>
    <input type="file" id="imageInput" accept="image/*">

    <div style="color:white;">
        Transparansi
        <input type="range" id="opacity" min="0" max="100" value="50">
    </div>

    <div style="color:white;">
        Ukuran
        <input type="range" id="size" min="20" max="200" value="100">
    </div>

</div>

<script>

const video = document.getElementById("camera");
const overlay = document.getElementById("overlay");

async function startCamera(){

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            }
        });

        video.srcObject = stream;

    }catch(err){
        alert("Kamera tidak bisa dibuka");
        console.log(err);
    }

}

startCamera();

document
.getElementById("imageInput")
.addEventListener("change",e=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        overlay.src = event.target.result;
    };

    reader.readAsDataURL(file);

});

document
.getElementById("opacity")
.addEventListener("input",e=>{

    overlay.style.opacity =
    e.target.value / 100;

});

document
.getElementById("size")
.addEventListener("input",e=>{

    overlay.style.width =
    e.target.value + "%";

});

</script>

</body>
</html>
